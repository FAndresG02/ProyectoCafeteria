<div class="header-card">
  <b>
    <h4>Administrar categoría</h4>
  </b>
  <button class="add-btn" (click)="handleAddAction()">
    <mat-icon>add_circle</mat-icon>Añadir Categoría
  </button>
</div>

<div class="filter-card">
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar Categoría</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput (keyup)="applyFilter($event)" placeholder="Nombre">
  </mat-form-field>
</div>


<div class="responsive_table">

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef>Acción</th>
      <td mat-cell *matCellDef="let element" class="action-link">
        <button mat-icon-button matTooltip="Editar" matTooltipPosition="right" (click)="handleEditAction(element)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayColumns;sticky:true"></tr>
    <tr mat-row *matRowDef="let row; columns:displayColumns;"></tr>
  </table>

</div>
