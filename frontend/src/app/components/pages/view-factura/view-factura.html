<div class="header-card">
    <b>
        <h4>Administrar Facturas</h4>
    </b>
</div>

<div class="filter-card">
    <mat-form-field appearance="outline" class="search-field">
        <mat-label>Buscar factura</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput (keyup)="applyFilter($event)" placeholder="Nombre">
    </mat-form-field>
</div>

<div class="responsive_table">

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let element"> {{element.email}} </td>
        </ng-container>

        <ng-container matColumnDef="contactNumber">
            <th mat-header-cell *matHeaderCellDef>Número de Contacto</th>
            <td mat-cell *matCellDef="let element"> {{element.contactNumber}} </td>
        </ng-container>

        <ng-container matColumnDef="paymentMethod">
            <th mat-header-cell *matHeaderCellDef>Método de Pago</th>
            <td mat-cell *matCellDef="let element"> {{element.paymentMethod}} </td>
        </ng-container>

        <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef>Total</th>
            <td mat-cell *matCellDef="let element"> {{element.total}} </td>
        </ng-container>

        <ng-container matColumnDef="view">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let element" class="action-link">
                <div class="action-buttons">
                    <button mat-icon-button matTooltip="Ver" matTooltipPosition="left"
                        (click)="handleViewAction(element)">
                        <mat-icon>visibility</mat-icon>
                    </button>

                    <button mat-icon-button (click)="handleDeleteAction(element)">
                        <mat-icon>delete</mat-icon>
                    </button>

                    <button mat-icon-button matTooltip="Descargar Informe" matTooltipPosition="right"
                        (click)="dowloadReportAction(element)">
                        <mat-icon>download</mat-icon>
                    </button>
                </div>

            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayColumns;sticky:true"></tr>
        <tr mat-row *matRowDef="let row; columns:displayColumns;"></tr>

    </table>

</div>
