<!-- Barra superior del diálogo (modal) -->
<mat-toolbar class="toolbar">

    <!-- Muestra la acción (Agregar/Editar) + texto "Categoria" -->
    <span> Factura </span>

    <!-- Espaciador para empujar el botón a la derecha -->
    <span class="spacer"></span>

    <!-- Botón para cerrar el diálogo -->
    <button mat-icon-button mat-dialog-close>
        <mat-icon>close</mat-icon>
    </button>
</mat-toolbar>

<mat-dialog-content class="dialog-content">

    <table id="customers" class="heading-table">
        <tr>
            <td><b>Name:</b> {{data?.name}} </td>
            <td><b>Email:</b> {{data?.email}} </td>
        </tr>
        <tr>
            <td><b>Número de contacto:</b> {{data?.contactNumber}} </td>
            <td><b>Método de pago:</b> {{data?.paymentMethod}} </td>
        </tr>
    </table>

    <div class="responsive_table">
        <br>
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Nombre</th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>
            <ng-container matColumnDef="category">
                <th mat-header-cell *matHeaderCellDef>Categoría</th>
                <td mat-cell *matCellDef="let element"> {{element.category}} </td>
            </ng-container>
            <ng-container matColumnDef="price">
                <th mat-header-cell *matHeaderCellDef>Precio</th>
                <td mat-cell *matCellDef="let element"> {{element.price}} </td>
            </ng-container>
            <ng-container matColumnDef="quantity">
                <th mat-header-cell *matHeaderCellDef>Cantidad</th>
                <td mat-cell *matCellDef="let element"> {{element.quantity}} </td>
            </ng-container>
            <ng-container matColumnDef="total">
                <th mat-header-cell *matHeaderCellDef>Total</th>
                <td mat-cell *matCellDef="let element"> {{element.total}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayColumns;sticky:true"></tr>
            <tr mat-row *matRowDef="let row; columns:displayColumns;"></tr>
        </table>
    </div>
</mat-dialog-content>
