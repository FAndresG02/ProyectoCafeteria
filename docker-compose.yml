version: "3.8"

services:
  db:
    image: mysql:8
    container_name: cafe-db
    restart: always
    environment:
      MYSQL_DATABASE: cafeSystem
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: fandresga/servicecafe:latest   
    container_name: cafe-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    env_file:
      - ./Backend-Proyecto-Cafeter-a/.env

  frontend:
    image: fandresga/appcafe:latest
    container_name: cafe-frontend
    restart: always
    depends_on:
      - app
    ports:
      - "82:80"

volumes:
  db_data: